name: Backend CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/Blog.Backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches-ignore: [ main ]
    paths:
      - 'src/Blog.Backend/**'

concurrency:
  group: backend-ci-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Blog.Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Blog.Backend.sln

      - name: Build
        run: dotnet build Blog.Backend.sln --configuration Release --no-restore