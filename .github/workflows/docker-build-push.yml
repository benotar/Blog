name: Build and push containers

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:

concurrency:
  group: docker-build-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COMPOSE_FILE: docker-compose.yml
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build images
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: docker compose -f ${{ env.COMPOSE_FILE }} build --progress=plain

      - name: Tag images with commit SHA
        run: |
          docker tag benotar/backend_blog:latest benotar/backend_blog:${{github.sha}}
          docker tag benotar/frontend_blog:latest benotar/frontend_blog:${{ github.sha }}

      - name: Push backend
        run: |
          docker push benotar/backend_blog:latest
          docker push benotar/backend_blog:${{github.sha}}

      - name: Push frontend
        run: |
          docker push benotar/frontend_blog:latest
          docker push benotar/frontend_blog:${{github.sha}}