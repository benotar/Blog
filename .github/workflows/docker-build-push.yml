name: Build and push containers

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./src/Blog.Backend
          push: true
          tags: |
            benotar/backend_blog:latest
            benotar/backend_blog:${{ github.sha }}
          build-args: DB_HOST=${{ secrets.DB_HOST }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./src/Blog.Frontend
          push: true
          tags: |
            benotar/frontend_blog:latest
            benotar/frontend_blog:${{ github.sha }}
          build-args: |
            VITE_API_URL_ARG=${{ secrets.VITE_API_URL }}
            VITE_FIREBASE_API_KEY_ARG=${{ secrets.VITE_FIREBASE_API_KEY }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
